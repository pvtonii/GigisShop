<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="0.55" stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#4C1D95"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.18" r="0.95">
      <stop offset="0" stop-color="#C4B5FD" stop-opacity="0.5"/>
      <stop offset="0.55" stop-color="#C4B5FD" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tag" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EDE9FE"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#2E1065" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- Etiqueta inclinada, centralizada -->
  <g transform="rotate(-30 512 512)">
    <!-- corpo da tag: pentágono com cantos arredondados -->
    <path d="
      M 312 332
      L 600 332
      Q 632 332 654 355
      L 706 410
      Q 718 423 718 440
      L 718 692
      Q 718 724 686 724
      L 312 724
      Q 280 724 280 692
      L 280 364
      Q 280 332 312 332 Z"
      fill="url(#tag)" filter="url(#shadow)"/>
    <!-- furo -->
    <circle cx="630" cy="408" r="34" fill="#7C3AED"/>
    <circle cx="630" cy="408" r="34" fill="none" stroke="#4C1D95" stroke-width="6"/>
    <!-- cifrão -->
    <text x="476" y="620" font-family="Georgia, 'Times New Roman', serif"
          font-size="300" font-weight="bold" fill="#6D28D9"
          text-anchor="middle">$</text>
  </g>
</svg>
